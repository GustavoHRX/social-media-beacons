<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GustavoHRX | Links</title>
    <!-- Importando Tailwind CSS e Fontes -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #050505; 
            color: white; 
            font-family: 'Inter', sans-serif; 
            -webkit-font-smoothing: antialiased;
        }
        .bento-card { 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .bento-card:hover { 
            transform: translateY(-5px); 
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 md:p-8 selection:bg-red-500/30">
    <div class="max-w-4xl w-full">
        <!-- Bento Grid -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            
            <!-- Profile Card (Top Cascade) -->
            <div class="md:col-span-4 bg-[#111] border border-white/10 rounded-[2.5rem] p-8 flex flex-col items-center text-center bento-card">
                <div class="w-24 h-24 rounded-2xl overflow-hidden mb-6 border border-white/20 shadow-2xl">
                    <img src="https://github.com/GustavoHRX.png" alt="GustavoHRX" class="w-full h-full object-cover">
                </div>
                <h1 class="text-4xl font-bold tracking-tight mb-3">GustavoHRX</h1>
                <p class="text-gray-400 text-base leading-relaxed max-w-md">
                    Links de Redes, barcos, varas.... Só pescar!
                </p>
            </div>

            <!-- YouTube Main -->
            <a href="https://www.youtube.com/@GustavoHRX" class="md:col-span-2 bg-red-600/10 border border-red-500/20 rounded-[2rem] p-6 flex flex-col items-center justify-center text-center bento-card hover:bg-red-600/20 group">
                <div class="w-12 h-12 bg-red-600 rounded-2xl flex items-center justify-center mb-3 shadow-lg shadow-red-600/20 group-hover:scale-110 transition-transform">
                    <i data-lucide="youtube" class="text-white w-6 h-6"></i>
                </div>
                <h3 class="font-bold text-lg">Canal Principal</h3>
                <p class="text-xs text-red-500/80 font-medium uppercase tracking-wider">YouTube</p>
            </a>

            <!-- YouTube Games -->
            <a href="https://www.youtube.com/@platinummramen" class="md:col-span-2 bg-red-600/10 border border-red-500/20 rounded-[2rem] p-6 flex flex-col items-center justify-center text-center bento-card hover:bg-red-600/20 group">
                <div class="w-12 h-12 bg-red-600 rounded-2xl flex items-center justify-center mb-3 shadow-lg shadow-red-600/20 group-hover:scale-110 transition-transform">
                    <i data-lucide="gamepad-2" class="text-white w-6 h-6"></i>
                </div>
                <h3 class="font-bold text-lg">Games</h3>
                <p class="text-xs text-red-500/80 font-medium uppercase tracking-wider">YouTube</p>
            </a>

            <!-- GitHub -->
            <a href="https://github.com/GustavoHRX" target="_blank" class="md:col-span-2 bg-white/5 border border-white/10 rounded-[2rem] p-6 flex flex-col items-center justify-center text-center bento-card hover:bg-white/10 group">
                <div class="w-12 h-12 bg-white rounded-2xl flex items-center justify-center mb-3 shadow-lg shadow-white/10 group-hover:scale-110 transition-transform">
                    <i data-lucide="github" class="text-black w-6 h-6"></i>
                </div>
                <h3 class="font-bold text-lg">Meu Github</h3>
                <p class="text-xs text-gray-400 font-medium uppercase tracking-wider">Projetos & Código</p>
            </a>

            <!-- Planilha -->
            <a href="https://docs.google.com/spreadsheets/d/1ACt9qs0O-givWYuZb0Taw4yifkesHmnQHU6E2GjtE7I/edit?usp=sharing" class="md:col-span-2 bg-emerald-600/10 border border-emerald-500/20 rounded-[2rem] p-6 flex flex-col items-center justify-center text-center bento-card hover:bg-emerald-600/20 group">
                <div class="w-12 h-12 bg-emerald-600 rounded-2xl flex items-center justify-center mb-3 shadow-lg shadow-emerald-600/20 group-hover:scale-110 transition-transform">
                    <i data-lucide="table" class="text-white w-6 h-6"></i>
                </div>
                <h3 class="font-bold text-lg">Planilha</h3>
                <p class="text-xs text-emerald-500/80 font-medium uppercase tracking-wider">Planilha de Jogos</p>
            </a>
        </div>

        <!-- Footer -->
        <footer class="mt-12 text-center">
            <p class="text-gray-500 text-xs font-medium uppercase tracking-[0.2em] mb-1">© 2025 GustavoHRX</p>
            <p class="text-gray-600 text-[10px] uppercase tracking-widest font-bold">Made in Google API Studio</p>
        </footer>
    </div>

    <!-- Inicializando os Ícones -->
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
